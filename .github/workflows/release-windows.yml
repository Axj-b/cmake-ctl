name: Release Windows Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version/tag (example: v0.1.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-package-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = ""
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "${{ github.event.inputs.version }}"
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Release version is empty."
          }

          Write-Host "Resolved release version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "VERSION=$version" >> $env:GITHUB_ENV
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and package release zip
        shell: pwsh
        run: |
          Write-Host "Packaging version: $env:VERSION"
          python scripts/create_release_zip.py --version "$env:VERSION" --platform windows-x64

      - name: Show dist contents
        shell: pwsh
        run: |
          Get-ChildItem dist | Format-Table -AutoSize

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmake-ctl-${{ steps.version.outputs.version }}-windows
          path: dist/*.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*.zip
          generate_release_notes: true
